name: Build TomeWeaver Multi-Platform

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform_name: Windows
          - os: macos-latest
            platform_name: MacOS
          - os: ubuntu-latest
            platform_name: Linux

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set Version Variable
      shell: bash
      run: |
        # Use the tag name if available, otherwise use 'latest-dev'
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          echo "APP_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
        else
          echo "APP_VERSION=latest-dev" >> $GITHUB_ENV
        fi

    - name: Install System Dependencies (Linux Only)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller customtkinter requests colorama

    - name: Build Executable (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        # Bundle the configs folder INTO the EXE
        pyinstaller --noconsole --onefile --name TomeWeaver_${{ matrix.platform_name }}_${{ env.APP_VERSION }} --paths scripts --collect-all customtkinter --add-data "configs;configs" scripts/gui.py

    - name: Build Executable (MacOS/Linux)
      if: matrix.os != 'windows-latest'
      run: |
        # Bundle the configs folder INTO the EXE
        pyinstaller --noconsole --onefile --name TomeWeaver_${{ matrix.platform_name }}_${{ env.APP_VERSION }} --paths scripts --collect-all customtkinter --add-data "configs:configs" scripts/gui.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TomeWeaver-${{ matrix.platform_name }}
        path: dist/TomeWeaver*

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest-dev' }}
        name: TomeWeaver Release ${{ env.APP_VERSION }}
        draft: false
        prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
        files: |
          dist/TomeWeaver*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}