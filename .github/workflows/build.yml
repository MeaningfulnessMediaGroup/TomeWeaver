name: Build TomeWeaver Multi-Platform

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# ADD THIS BLOCK TO FIX THE 403 ERROR
permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: TomeWeaver-Windows.exe
            asset_name: TomeWeaver-Windows
          - os: macos-latest
            artifact_name: TomeWeaver-MacOS
            asset_name: TomeWeaver-MacOS
          - os: ubuntu-latest
            artifact_name: TomeWeaver-Linux
            asset_name: TomeWeaver-Linux

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies (Linux Only)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller customtkinter requests colorama

    - name: Build Executable (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --noconsole --onefile --name TomeWeaver --paths scripts --collect-all customtkinter --add-data "configs;configs" scripts/gui.py

    - name: Build Executable (MacOS/Linux)
      if: matrix.os != 'windows-latest'
      run: |
        pyinstaller --noconsole --onefile --name TomeWeaver --paths scripts --collect-all customtkinter --add-data "configs:configs" scripts/gui.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: dist/TomeWeaver*

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest-dev' }}
        name: TomeWeaver Release ${{ github.ref_name }}
        draft: false
        prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
        files: |
          dist/TomeWeaver*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}